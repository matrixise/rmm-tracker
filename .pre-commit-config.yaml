repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        language: system
        entry: gofmt -w
        files: \.go$
        pass_filenames: true

      - id: taskfile-validate
        name: Validate Taskfile (task --list)
        language: system
        entry: task
        args: [--list]
        files: ^Taskfile\.yml$
        pass_filenames: false

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.10.1
    hooks:
      - id: golangci-lint
