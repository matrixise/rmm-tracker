name: Test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      ci: ${{ steps.filter.outputs.ci }}
      migrations: ${{ steps.filter.outputs.migrations }}
      markdown: ${{ steps.filter.outputs.markdown }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Detect changed paths
        uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            go:
              - "**/*.go"
              - "go.mod"
              - "go.sum"
              - "Taskfile.yml"
              - ".golangci.yml"
            ci:
              - ".github/workflows/test.yml"
            migrations:
              - "internal/storage/migrations/**"
            markdown:
              - "**/*.md"

  lint:
    needs: changes
    if: github.ref_type == 'tag' || needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install yamllint
        run: uv tool install yamllint

      - name: Lint Taskfile (yamllint)
        run: yamllint Taskfile.yml

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint Taskfile (task --list)
        run: task --list

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  test:
    needs: changes
    if: github.ref_type == 'tag' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage report
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  integration-test:
    needs: [changes, test]
    # Runs when Go code changes (test job ran) OR when only migrations changed
    # (test job was skipped but schema changes still need integration validation).
    if: >-
      github.ref_type == 'tag' ||
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rmm
          POSTGRES_PASSWORD: rmm
          POSTGRES_DB: rmm_tracker
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://rmm:rmm@localhost:5432/rmm_tracker?sslmode=disable
        run: go test -v -race -tags integration -timeout 60s ./internal/storage/...

  markdown-lint:
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v22.0.0
        with:
          globs: |
            **/*.md
            !CLAUDE.md
            !IMPLEMENTATION.md
            !docs/**
          config: ".markdownlint.yml"

  spell-check:
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Spell check
        uses: codespell-project/actions-codespell@v2.2
        with:
          check_filenames: true
          path: .
          # Restrict to markdown only — domain-specific tokens in Go/SQL would
          # produce false positives (armmXDAI, armmUSDC, pgx, goose, gocron…)
          skip: "*.go,*.sum,*.mod,*.sql,*.toml,*.yml,*.yaml,*.json,*.html,*.templ"
