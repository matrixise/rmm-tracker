name: Test

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Taskfile.yml"
      - ".github/workflows/test.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Taskfile.yml"
      - ".github/workflows/test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install yamllint
        run: uv tool install yamllint

      - name: Lint Taskfile (yamllint)
        run: yamllint Taskfile.yml

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint Taskfile (task --list)
        run: task --list

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage report
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  integration-test:
    needs: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rmm
          POSTGRES_PASSWORD: rmm
          POSTGRES_DB: rmm_tracker
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://rmm:rmm@localhost:5432/rmm_tracker?sslmode=disable
        run: go test -v -race -tags integration -timeout 60s ./internal/storage/...
