name: Build and Publish Builder Image

# Rebuild the builder base image (which pre-downloads all Go modules)
# whenever go.mod or go.sum change, or on manual trigger.
#
# This keeps `go mod download` out of the critical path in docker-publish.yml.

on:
  push:
    branches: [main]
    paths:
      - go.mod
      - go.sum
  workflow_dispatch:

env:
  BUILDER_IMAGE: matrixise/rmm-tracker-builder

jobs:
  build-builder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Go version from go.mod
        id: goversion
        run: |
          GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}' | cut -d. -f1-2)
          echo "version=${GO_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push builder image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.builder
          # Builder image only needs to run on the CI host architecture (amd64).
          # The main Dockerfile uses --platform=$BUILDPLATFORM so arm64 builds
          # also pull the amd64 builder image and cross-compile natively.
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.BUILDER_IMAGE }}:go${{ steps.goversion.outputs.version }}
            ${{ env.BUILDER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
