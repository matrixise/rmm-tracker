name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Steps (do exactly these, in order, nothing more):
            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to get the diff.
            2. Analyze the diff for: correctness, security issues, best practices.
            3. Post a concise review with `gh pr comment ${{ github.event.pull_request.number }} --body "<your review>"`.

            Be direct and concise. Do not explore the repo beyond the diff.
          claude_args: >-
            --max-turns 4
            --allowed-tools "Bash(gh pr diff:*),Bash(gh pr comment:*)"
